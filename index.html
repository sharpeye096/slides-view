
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoco - Browse Presentation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      color: #e0e0e6;
      height: 100vh;
      overflow: hidden;
    }

    /* Upload View */
    .view { display: none; }
    .view.active { display: flex; }

    #upload-view {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }

    .brand {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .brand span {
      color: #6c63ff;
    }

    .upload-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
      max-width: 520px;
      width: 90%;
    }

    #drop-zone {
      border: 2px dashed #3a3a4a;
      border-radius: 12px;
      padding: 48px 32px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: #6c63ff;
      background: rgba(108, 99, 255, 0.06);
    }

    .drop-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .drop-label {
      font-size: 16px;
      color: #a0a0b0;
      margin-bottom: 8px;
    }

    .drop-hint {
      font-size: 13px;
      color: #606070;
    }

    #file-name {
      margin-top: 12px;
      font-size: 14px;
      color: #8080a0;
      min-height: 20px;
    }

    .status {
      font-size: 14px;
      color: #8080a0;
      min-height: 20px;
    }

    .status.error {
      color: #ff6b6b;
    }

    #file-input {
      display: none;
    }

    /* Viewer View */
    #viewer-view {
      flex-direction: column;
      height: 100vh;
    }

    .viewer-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 44px;
      min-height: 44px;
      background: #16161e;
      border-bottom: 1px solid #2a2a3a;
    }

    #viewer-title {
      font-size: 14px;
      font-weight: 600;
      color: #c0c0d0;
    }

    .btn {
      background: #2a2a3e;
      color: #c0c0d0;
      border: 1px solid #3a3a4a;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover {
      background: #3a3a52;
    }

    #viewer-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #fff;
    }
  </style>
</head>
<body>

  <!-- Upload View -->
  <div id="upload-view" class="view active">
    <div class="brand">invoco<span>.</span></div>
    <div class="upload-card">
      <div id="drop-zone">
        <div class="drop-icon">&#128193;</div>
        <div class="drop-label">Drop a zipped presentation here</div>
        <div class="drop-hint">or click to browse (.zip)</div>
      </div>
      <div id="file-name"></div>
      <input type="file" id="file-input" accept=".zip">
    </div>
    <div id="status" class="status"></div>
  </div>

  <!-- Viewer View -->
  <div id="viewer-view" class="view">
    <div class="viewer-toolbar">
      <span id="viewer-title"></span>
      <button id="upload-new-btn" class="btn">Upload New</button>
    </div>
    <iframe id="viewer-frame" src="about:blank"></iframe>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
          integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
